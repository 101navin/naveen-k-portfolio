
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Naveen K - Portfolio | Web Developer & AI/ML Enthusiast</title>
    <meta name="description" content="Portfolio of Naveen K - Web Developer & AI/ML Enthusiast specializing in Python, JavaScript and React" />
    <meta name="author" content="Naveen K" />

    <meta property="og:title" content="Naveen K - Portfolio | Web Developer & AI/ML Enthusiast" />
    <meta property="og:description" content="Portfolio of Naveen K - Web Developer & AI/ML Enthusiast specializing in Python, JavaScript and React" />
    <meta property="og:type" content="website" />

    <!-- Custom Decent Favicon Logo -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root">
      <!-- Premium Site Loading Screen -->
      <div id="loading-screen" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0f172a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: 'Inter', sans-serif;
      ">
        <div style="position: relative; width: 100px; height: 100px; margin-bottom: 20px;">
          <!-- Glowing background circle -->
          <div style="
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            filter: blur(15px);
            opacity: 0.5;
            animation: pulse 2s infinite ease-in-out;
          "></div>
          
          <!-- Logo Container -->
          <div style="
            position: absolute;
            inset: 4px;
            background: #1e293b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
          ">
            <!-- Stylized NK SVG Logo -->
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 50px; height: 50px;">
              <defs>
                <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#3b82f6" />
                  <stop offset="100%" stop-color="#a855f7" />
                </linearGradient>
              </defs>
              <path d="M28 70V30L50 70V30" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M62 70V30" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="round" />
              <path d="M62 50L78 30M62 50L78 70" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>

          <!-- Spinner ring -->
          <svg style="
            position: absolute;
            inset: -6px;
            width: 112px;
            height: 112px;
            animation: spin 1.5s linear infinite;
          " viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="54" stroke="url(#logo-grad)" stroke-width="3" fill="none" stroke-dasharray="80 300" stroke-linecap="round" />
          </svg>
        </div>
        
        <!-- Text Logo -->
        <div style="
          font-size: 1.25rem;
          font-weight: 700;
          letter-spacing: 0.1em;
          color: #f8fafc;
          margin-top: 10px;
          background: linear-gradient(135deg, #3b82f6, #a855f7);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: pulse 2s infinite ease-in-out;
        ">
          NAVEEN K
        </div>
        
        <!-- Progress Bar Indicator -->
        <div style="
          width: 150px;
          height: 3px;
          background: rgba(255, 255, 255, 0.1);
          border-radius: 99px;
          margin-top: 15px;
          overflow: hidden;
          position: relative;
        ">
          <div style="
            position: absolute;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            border-radius: 99px;
            width: 100%;
            animation: load 2s infinite ease-in-out;
          "></div>
        </div>
      </div>

      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 0.6; transform: scale(0.98); }
          50% { opacity: 1; transform: scale(1.02); }
        }
        @keyframes load {
          0% { left: -100%; width: 50%; }
          50% { left: 25%; width: 70%; }
          100% { left: 100%; width: 50%; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
